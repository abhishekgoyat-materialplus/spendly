{% extends "base.html" %}

{% block title %}Edit Expense — Spendly{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container">

        <div class="auth-header">
            <h1 class="auth-title">Edit expense</h1>
            <p class="auth-subtitle">Update your transaction details</p>
        </div>

        <div class="auth-card">
            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('edit_expense', id=expense.id) }}">
                <div class="form-group">
                    <label for="amount">Amount (₹)</label>
                    <input type="number" id="amount" name="amount"
                           class="form-input" placeholder="0.00"
                           step="0.01" min="0.01"
                           value="{{ amount if amount is defined else expense.amount }}"
                           required autofocus>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-input" required>
                        <option value="" disabled>Select a category</option>
                        {% set current_category = category if category is defined else expense.category %}
                        {% for cat in ["Food", "Transport", "Bills", "Health", "Entertainment", "Shopping", "Other"] %}
                        <option value="{{ cat }}" {{ 'selected' if current_category == cat else '' }}>{{ cat }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date"
                           class="form-input"
                           value="{{ date if date is defined else expense.date }}"
                           required>
                </div>
                <div class="form-group">
                    <label for="description">Description <span class="form-optional">(optional)</span></label>
                    <input type="text" id="description" name="description"
                           class="form-input" placeholder="e.g. Grocery run"
                           maxlength="200"
                           value="{{ description if description is defined else (expense.description or '') }}">
                </div>
                <button type="submit" class="btn-submit">Save Changes</button>
            </form>
        </div>

        <p class="auth-switch">
            <a href="{{ url_for('profile') }}">Cancel</a>
        </p>

    </div>
</section>

{% endblock %}
